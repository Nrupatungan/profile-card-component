<!DOCTYPE html>
<html lang="en-US">
    <head>
        <!-- General meta tags needed-->
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <!-- Needed for responsive design -->
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!-- If you want custom browser colors on mobile -->
        <meta name="theme-color" content="#1843c1" />
        <meta name="apple-mobile-web-app-status-bar-style" content="#1843c1">

        <title>Frontend Mentor | Profile card component</title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet"> 
        <!-- CSS File -->
        <link rel="stylesheet" href="dist/style.css?cb=1643353101594">
        <!-- Favicon -->
        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    </head>
    <body>

        <!-- our main acts as a container for our profile card -->
        <main>

            <!-- header -->
            <div class="header">
                <img src="./images/bg-pattern-card.svg" alt="bg-pattern-card" id="bg-card">
                <img src="./images/image-victor.jpg" alt="image-victor" id="victor">
                <div class="main-name">
                    <h3>Victor Crest</h3> 
                    <p>26</p>
                </div>
                <p class="london">London</p>
            </div>

            <!-- horizontal line -->
            <div class="line"></div>

            <!-- Stats section -->
            <div class="stats">
                <div>
                    <h2>80K</h2>
                    <p>Followers</p>
                </div>

                <div>
                    <h2>803K</h2>
                    <p>Likes</p>
                </div>

                <div>
                    <h2>1.4K</h2>
                    <p>Photos</p>
                </div>
            </div>

        </main>

        <!-- JavaScript File -->
        <script src="dist/all.js?cb=1643353101594"></script>
    </body>
</html>
